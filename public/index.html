<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Nova-OS 星尘聊天</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 星空背景 -->
  <div class="starfield">
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>
  </div>

  <!-- 主应用容器 -->
  <div id="app">
    <!-- 加载界面 -->
    <div id="loading-screen" class="screen active">
      <div class="loading-content">
        <div class="nova-logo">
          <svg viewBox="0 0 100 100" width="80" height="80">
            <circle cx="50" cy="50" r="45" fill="none" stroke="#00d4ff" stroke-width="2"/>
            <circle cx="50" cy="50" r="35" fill="none" stroke="#7b2ff7" stroke-width="2" opacity="0.6"/>
            <circle cx="50" cy="50" r="25" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.3"/>
            <circle cx="50" cy="50" r="8" fill="#00d4ff"/>
            <circle cx="30" cy="35" r="3" fill="#fff" opacity="0.8"/>
            <circle cx="70" cy="40" r="2" fill="#fff" opacity="0.6"/>
            <circle cx="60" cy="70" r="2.5" fill="#fff" opacity="0.7"/>
          </svg>
        </div>
        <h1 class="app-title">Nova-OS</h1>
        <p class="app-subtitle">星尘聊天生态系统</p>
        <div class="loading-spinner"></div>
      </div>
    </div>

    <!-- 登录/注册界面 -->
    <div id="auth-screen" class="screen">
      <div class="auth-container">
        <div class="auth-header">
          <svg viewBox="0 0 100 100" width="60" height="60">
            <circle cx="50" cy="50" r="45" fill="none" stroke="#00d4ff" stroke-width="2"/>
            <circle cx="50" cy="50" r="8" fill="#00d4ff"/>
          </svg>
          <h1>Nova-OS</h1>
        </div>
        
        <!-- 登录表单 -->
        <form id="login-form" class="auth-form">
          <h2>登录</h2>
          <div class="form-group">
            <label for="login-account">Gal号码 或 邮箱</label>
            <input type="text" id="login-account" placeholder="GAL90IA56MH2 或 your@email.com" required>
          </div>
          <div class="form-group">
            <label for="login-password">密码</label>
            <input type="password" id="login-password" placeholder="输入密码" required>
          </div>
          <button type="submit" class="btn btn-primary">登录</button>
          <p class="auth-switch">还没有账号？<a href="#" id="show-register">立即注册</a></p>
        </form>
        
        <!-- 注册表单 -->
        <form id="register-form" class="auth-form hidden">
          <h2>注册</h2>
          <div class="form-group">
            <label for="register-nickname">昵称</label>
            <input type="text" id="register-nickname" placeholder="给自己起个名字" required>
          </div>
          <div class="form-group">
            <label for="register-email">邮箱 <span style="color:var(--accent-blue);font-size:12px">（用于找回账号）</span></label>
            <input type="email" id="register-email" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label for="register-password">密码</label>
            <input type="password" id="register-password" placeholder="至少6位" required minlength="6">
          </div>
          <div class="form-group">
            <label for="register-confirm">确认密码</label>
            <input type="password" id="register-confirm" placeholder="再输一次" required>
          </div>
          <button type="submit" class="btn btn-primary">注册</button>
          <p class="auth-switch">已有账号？<a href="#" id="show-login">去登录</a></p>
        </form>
        
        <div id="auth-error" class="error-message hidden"></div>
      </div>
    </div>

    <!-- 主界面 -->
    <div id="main-screen" class="screen">
      <!-- 顶部栏 -->
      <header class="top-bar">
        <div class="current-user">
          <span class="user-gal" id="current-gal"></span>
        </div>
        <h1 class="page-title" id="page-title">消息</h1>
        <button class="btn-icon" id="btn-settings">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65A.506.506 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1 0 .33.03.65.07.97l-2.11 1.66c-.19.15-.25.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.06.74 1.69.99l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.26 1.17-.59 1.69-.99l2.49 1.01c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.66z"/>
          </svg>
        </button>
      </header>

      <!-- 页面容器 -->
      <main class="page-container">
        <!-- 消息页面 -->
        <div class="page" id="page-chats">
          <div class="chat-list" id="chat-list">
            <div class="empty-state">
              <p>还没有聊天记录</p>
              <p>开始新的对话吧！</p>
            </div>
          </div>
          <button class="fab" id="btn-new-chat" title="新建聊天">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
              <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
          </button>
        </div>

        <!-- 联系人页面 -->
        <div class="page hidden" id="page-contacts">
          <div class="contacts-list" id="contacts-list">
            <div class="empty-state">
              <p>还没有联系人</p>
              <p>通过Gal号码添加好友</p>
            </div>
          </div>
          <button class="fab" id="btn-add-contact" title="添加联系人">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
              <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
          </button>
        </div>

        <!-- AI页面 -->
        <div class="page hidden" id="page-ai">
          <div class="ai-personas" id="ai-personas">
            <!-- AI人格卡片由JS动态生成 -->
          </div>
        </div>

        <!-- 钱包页面 -->
        <div class="page hidden" id="page-wallet">
          <div class="wallet-container">
            <div class="wallet-card">
              <div class="wallet-balance">
                <span class="balance-label">测试网余额</span>
                <span class="balance-value" id="wallet-balance">1.0000</span>
                <span class="balance-symbol">NOV</span>
              </div>
              <div class="wallet-address" id="wallet-address">
                0x0000000000000000000000000000000000000000
              </div>
            </div>
            <div class="wallet-actions">
              <button class="btn btn-secondary" id="btn-create-wallet">生成新地址</button>
              <button class="btn btn-secondary" id="btn-send">转账</button>
            </div>
            <div class="wallet-history">
              <h3>交易记录</h3>
              <div class="tx-list" id="tx-list">
                <div class="empty-state">
                  <p>暂无交易记录</p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 我的页面 -->
        <div class="page hidden" id="page-profile">
          <div class="profile-container">
            <div class="profile-avatar" id="profile-avatar">
              <span>👨‍🚀</span>
            </div>
            <div class="profile-info">
              <h2 id="profile-nickname">用户昵称</h2>
              <p class="profile-gal" id="profile-gal">Gal://XXXXXXXXXXXX</p>
            </div>
            <div class="profile-actions">
              <button class="btn btn-secondary" id="btn-edit-profile">编辑资料</button>
              <button class="btn btn-danger" id="btn-logout">退出登录</button>
            </div>
            <div class="profile-stats">
              <div class="stat-item">
                <span class="stat-value" id="stat-contacts">0</span>
                <span class="stat-label">好友</span>
              </div>
              <div class="stat-item">
                <span class="stat-value" id="stat-chats">0</span>
                <span class="stat-label">聊天</span>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- 底部导航 -->
      <nav class="bottom-nav">
        <button class="nav-item active" data-page="chats">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
          </svg>
          <span>消息</span>
        </button>
        <button class="nav-item" data-page="contacts">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
          </svg>
          <span>联系人</span>
        </button>
        <button class="nav-item" data-page="ai">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M21 10.12h-6.78l2.74-2.82c-2.73-2.7-7.15-2.8-9.88-.1-2.73 2.71-2.73 7.08 0 9.79s7.15 2.71 9.88 0C18.32 15.65 19 14.08 19 12.1h2c0 1.98-.88 4.55-2.64 6.29-3.51 3.48-9.21 3.48-12.72 0-3.5-3.47-3.53-9.11-.02-12.58s9.14-3.47 12.65 0L21 3v7.12zM12.5 8v4.25l3.5 2.08-.72 1.21L11 13V8h1.5z"/>
          </svg>
          <span>AI</span>
        </button>
        <button class="nav-item" data-page="wallet">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
          </svg>
          <span>钱包</span>
        </button>
        <button class="nav-item" data-page="profile">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
          </svg>
          <span>我的</span>
        </button>
      </nav>
    </div>

    <!-- 聊天窗口 -->
    <div id="chat-window" class="chat-window hidden">
      <div class="chat-header">
        <button class="btn-icon btn-back" id="btn-chat-back">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
          </svg>
        </button>
        <div class="chat-info" id="chat-info">
          <span class="chat-name">聊天名称</span>
          <span class="chat-status">在线</span>
        </div>
        <div class="chat-actions">
          <button class="btn-icon" id="btn-chat-info" title="聊天信息">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="chat-messages" id="chat-messages">
        <!-- 消息列表 -->
      </div>
      <div class="chat-typing" id="chat-typing">
        <!-- 正在输入提示 -->
      </div>
      <div class="chat-input-area">
        <div class="message-options">
          <button class="btn-icon btn-option" id="btn-destroy" title="阅后即焚">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/>
            </svg>
          </button>
          <button class="btn-icon btn-option" id="btn-anonymous" title="匿踪消息">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
          </button>
        </div>
        <div class="destroy-timer hidden" id="destroy-timer">
          <span>阅后</span>
          <select id="destroy-ttl">
            <option value="3">3秒</option>
            <option value="10">10秒</option>
            <option value="30" selected>30秒</option>
            <option value="60">60秒</option>
          </select>
        </div>
        <input type="text" id="message-input" placeholder="输入消息..." autocomplete="off">
        <button class="btn-icon btn-send" id="btn-send-message">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- AI聊天窗口 -->
    <div id="ai-chat-window" class="chat-window hidden">
      <div class="chat-header">
        <button class="btn-icon btn-back" id="btn-ai-chat-back">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
          </svg>
        </button>
        <div class="chat-info">
          <span class="chat-name" id="ai-chat-name">Nova助手</span>
          <span class="chat-status">AI在线</span>
        </div>
      </div>
      <div class="chat-messages" id="ai-chat-messages">
        <!-- AI消息列表 -->
      </div>
      <div class="chat-input-area">
        <input type="text" id="ai-message-input" placeholder="和AI聊聊..." autocomplete="off">
        <button class="btn-icon btn-send" id="btn-send-ai-message">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- 模态框 -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">标题</h3>
        <button class="btn-icon" id="btn-modal-close">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- 模态框内容 -->
      </div>
      <div class="modal-footer" id="modal-footer">
        <!-- 模态框按钮 -->
      </div>
    </div>
  </div>

  <!-- Toast通知 -->
  <div id="toast" class="toast hidden">
    <span id="toast-message">提示消息</span>
  </div>

  <!-- 脚本加载 -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/crypto.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/chat.js"></script>
  <script src="/js/ai.js"></script>
  <script src="/js/wallet.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
